name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build_pwa:
    name: Build PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install pnpm packages
        run: pnpm install

      - name: Build project (PWA)
        run: pnpm run build:pwa

      - name: Upload PWA build
        uses: actions/upload-artifact@v7
        with:
          name: pwa
          path: ./dist

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install pnpm packages
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: normal
          path: ./dist

  release:
    name: Release
    needs: [build, build_pwa]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download PWA artifact
        uses: actions/download-artifact@v8
        with:
          name: pwa
          path: ./dist_pwa

      - name: Download normal artifact
        uses: actions/download-artifact@v8
        with:
          name: normal
          path: ./dist_normal

      - name: Zip artifacts
        run: |
          cd dist_pwa   && zip -r ../p-stream.pwa.zip .
          cd ../dist_normal && zip -r ../p-stream.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: P-Stream v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: |
            p-stream.pwa.zip
            p-stream.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker images published to GHCR ──────────────────────────────────────
  #
  # Two OCI-compliant variants are pushed on every main-branch push:
  #
  #   Standard  ghcr.io/<owner>/smov:latest     ghcr.io/<owner>/smov:vX.Y.Z
  #   PWA       ghcr.io/<owner>/smov:pwa        ghcr.io/<owner>/smov:vX.Y.Z-pwa
  #
  # • Provenance (SLSA) + SBOM attestations are attached to both images.
  # • Multi-arch: linux/amd64 + linux/arm64.
  # • NO secrets are baked into image layers; all config is injected at
  #   `docker run` time via env vars or Docker secret files.
  registry:
    name: Push standard image to GHCR
    needs: [build, build_pwa]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # required for SLSA provenance attestation
      attestations: write   # required for image attestation

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI image metadata (standard)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.pkg.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.pkg.outputs.version }}
          labels: |
            org.opencontainers.image.title=P-Stream
            org.opencontainers.image.description=P-Stream — watch movies and TV shows for free
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push standard image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: PWA_ENABLED=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OCI provenance (SLSA level 3) + SBOM attestations
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=standard
          cache-to: type=gha,mode=max,scope=standard

  registry_pwa:
    name: Push PWA image to GHCR
    needs: [build, build_pwa]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract OCI image metadata (PWA)
        id: meta-pwa
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-pwa,onlatest=true
          tags: |
            type=raw,value=pwa
            type=semver,pattern={{version}},value=v${{ steps.pkg.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.pkg.outputs.version }}
          labels: |
            org.opencontainers.image.title=P-Stream (PWA)
            org.opencontainers.image.description=P-Stream — watch movies and TV shows for free (PWA edition with service worker)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push PWA image
        id: push-pwa
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: PWA_ENABLED=true
          tags: ${{ steps.meta-pwa.outputs.tags }}
          labels: ${{ steps.meta-pwa.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=pwa
          cache-to: type=gha,mode=max,scope=pwa
