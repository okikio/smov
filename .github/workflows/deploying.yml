name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build_pwa:
    name: Build PWA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install pnpm packages
        run: pnpm install

      - name: Build project
        run: pnpm run build:pwa

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: pwa
          path: ./dist

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install pnpm packages
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: normal
          path: ./dist

  release:
    name: Release
    needs: [build, build_pwa]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download PWA artifact
        uses: actions/download-artifact@v4
        with:
          name: pwa
          path: ./dist_pwa

      - name: Zip PWA files
        run: cd dist_pwa && zip -r ../p-stream.pwa.zip .

      - name: Download normal artifact
        uses: actions/download-artifact@v4
        with:
          name: normal
          path: ./dist_normal

      - name: Zip normal files
        run: cd dist_normal && zip -r ../p-stream.zip .

      - name: Get version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@main

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.package-version.outputs.current-version }}
          release_name: P-Stream v${{ steps.package-version.outputs.current-version }}
          draft: false
          prerelease: false

      - name: Upload release (PWA)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./p-stream.pwa.zip
          asset_name: p-stream.pwa.zip
          asset_content_type: application/zip

      - name: Upload Release (Normal)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./p-stream.zip
          asset_name: p-stream.zip
          asset_content_type: application/zip

  # ── Docker images published to GHCR ──────────────────────────────────────
  # Two variants are pushed:
  #   • standard  ghcr.io/<owner>/smov:latest  / ghcr.io/<owner>/smov:vX.Y.Z
  #   • pwa       ghcr.io/<owner>/smov:pwa     / ghcr.io/<owner>/smov:vX.Y.Z-pwa
  #
  # Both images are OCI-compliant (provenance + SBOM attestations attached).
  # Sensitive runtime config is injected via env vars at `docker run` time —
  # no secrets are baked into image layers.
  registry:
    name: Push standard image to GHCR
    needs: [build, build_pwa]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for OCI provenance attestation
      id-token: write
      attestations: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version from package.json
        id: package-version
        uses: martinbeentjes/npm-get-version-action@main

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (standard)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.package-version.outputs.current-version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.package-version.outputs.current-version }}
          labels: |
            org.opencontainers.image.title=P-Stream
            org.opencontainers.image.description=P-Stream — watch movies and TV shows for free
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push standard Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PWA_ENABLED=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OCI provenance and SBOM attestations
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=standard
          cache-to: type=gha,mode=max,scope=standard

  registry_pwa:
    name: Push PWA image to GHCR
    needs: [build, build_pwa]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version from package.json
        id: package-version
        uses: martinbeentjes/npm-get-version-action@main

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (PWA)
        id: meta-pwa
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-pwa,onlatest=true
          tags: |
            type=raw,value=pwa
            type=semver,pattern={{version}},value=v${{ steps.package-version.outputs.current-version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.package-version.outputs.current-version }}
          labels: |
            org.opencontainers.image.title=P-Stream (PWA)
            org.opencontainers.image.description=P-Stream — watch movies and TV shows for free (PWA edition)
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push PWA Docker image
        id: build-and-push-pwa
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PWA_ENABLED=true
          tags: ${{ steps.meta-pwa.outputs.tags }}
          labels: ${{ steps.meta-pwa.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=pwa
          cache-to: type=gha,mode=max,scope=pwa