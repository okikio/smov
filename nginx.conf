server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Serve pre-compressed .gz / .br files when the client supports them
    gzip_static on;

    # ── Security headers (web-standard) ──────────────────────────────────────
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Block the site from being framed (clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Modern browsers rely on CSP; disable legacy XSS filter that can cause issues
    add_header X-XSS-Protection "0" always;
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy: restrict powerful features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite produces hashed filenames; safe to cache forever
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Runtime config — NEVER cache ─────────────────────────────────────────
    # config.js is rewritten at every container start from env vars / secrets
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All unmatched paths return index.html so React Router can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }
}
